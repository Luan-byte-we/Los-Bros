<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Bros Notify • Quick Join</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a0e00 0%, #2a1a00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background com losangos */
        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(255, 140, 0, 0.03) 0px, rgba(255, 140, 0, 0.03) 20px, transparent 20px, transparent 40px),
                repeating-linear-gradient(-45deg, rgba(255, 140, 0, 0.03) 0px, rgba(255, 140, 0, 0.03) 20px, transparent 20px, transparent 40px);
            z-index: 0;
            animation: patternMove 20s linear infinite;
        }

        @keyframes patternMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* Losangos flutuantes */
        .floating-losange {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 140, 0, 0.05);
            border: 2px solid rgba(255, 140, 0, 0.2);
            transform: rotate(45deg);
            pointer-events: none;
            z-index: 0;
        }

        .floating-losange:nth-child(1) { top: 10%; left: 5%; animation: float 6s ease-in-out infinite; }
        .floating-losange:nth-child(2) { bottom: 15%; right: 8%; animation: float 8s ease-in-out infinite; }
        .floating-losange:nth-child(3) { top: 20%; right: 15%; animation: float 7s ease-in-out infinite; }
        .floating-losange:nth-child(4) { bottom: 25%; left: 10%; animation: float 9s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: rotate(45deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(-20px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
        }

        .main-card {
            background: rgba(20, 12, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #ff8c00;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(255, 140, 0, 0.3),
                        0 0 80px rgba(255, 140, 0, 0.2);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff8c00 0%, #ff6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .logo-emoji {
            font-size: 42px;
            filter: drop-shadow(0 0 10px rgba(255, 140, 0, 0.5));
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .subtitle {
            font-size: 18px;
            color: #ff8c00;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subtitle span {
            font-size: 20px;
        }

        .join-box {
            background: rgba(255, 140, 0, 0.05);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 24px;
            padding: 30px;
            margin: 30px 0 20px;
        }

        .join-title {
            font-size: 24px;
            color: #ff8c00;
            margin-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .join-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .job-id-input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 140, 0, 0.3);
            border-radius: 16px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 1px;
        }

        .job-id-input::placeholder {
            color: rgba(255, 140, 0, 0.5);
            font-size: 14px;
        }

        .job-id-input:focus {
            outline: none;
            border-color: #ff8c00;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .join-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff8c00 0%, #ff6b00 100%);
            border: none;
            border-radius: 16px;
            color: #000;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.3);
        }

        .join-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 140, 0, 0.5);
            background: linear-gradient(135deg, #ff9900 0%, #ff7700 100%);
        }

        .join-button:active {
            transform: translateY(0);
        }

        .info-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 140, 0, 0.1);
            border-radius: 50px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff8c00;
            font-size: 14px;
            font-weight: 600;
        }

        .info-item span {
            font-size: 18px;
        }

        .place-id-badge {
            background: rgba(255, 140, 0, 0.15);
            padding: 8px 15px;
            border-radius: 30px;
            color: #ff8c00;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 140, 0, 0.3);
            margin-top: 15px;
            display: inline-block;
        }

        .footer {
            margin-top: 25px;
            color: rgba(255, 140, 0, 0.6);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Loading animation */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            color: #ff8c00;
        }

        .loading.active {
            display: flex;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: #ff8c00;
            border-radius: 50%;
            animation: loadingDot 1.4s infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadingDot {
            0%, 60%, 100% { transform: scale(1); opacity: 0.5; }
            30% { transform: scale(1.5); opacity: 1; }
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .main-card {
                padding: 25px;
            }

            .logo-text {
                font-size: 28px;
            }

            .logo-emoji {
                font-size: 32px;
            }

            .join-title {
                font-size: 20px;
            }

            .join-description {
                font-size: 13px;
            }

            .job-id-input {
                padding: 15px;
                font-size: 14px;
            }

            .join-button {
                padding: 15px;
                font-size: 18px;
            }

            .info-bar {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    
    <!-- Losangos decorativos -->
    <div class="floating-losange"></div>
    <div class="floating-losange"></div>
    <div class="floating-losange"></div>
    <div class="floating-losange"></div>

    <div class="container">
        <div class="main-card">
            <div class="header">
                <div class="logo">
                    <span class="logo-emoji">🔸</span>
                    <span class="logo-text">LOS BROS NOTIFY</span>
                    <span class="logo-emoji">🟧</span>
                </div>
                <div class="subtitle">
                    <span>🔸</span> Quick Join <span>🟧</span>
                </div>
            </div>

            <div class="join-box">
                <div class="join-title">JOIN A SERVER</div>
                <div class="join-description">
                    Enter a Roblox Job ID to join a specific server instantly.
                </div>

                <div class="input-group">
                    <input type="text" 
                           class="job-id-input" 
                           id="jobIdInput" 
                           placeholder="Enter Job ID..." 
                           autocomplete="off">
                    
                    <button class="join-button" id="joinButton">
                        JOIN <span>🔸</span>
                    </button>
                </div>

                <div class="loading" id="loading">
                    <span>Connecting</span>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>

                <div class="place-id-badge" id="placeIdDisplay">
                    🟧 Place ID: 109983668079237
                </div>
            </div>

            <div class="info-bar">
                <div class="info-item">
                    <span>🔸</span> Status: Online
                </div>
                <div class="info-item">
                    <span>🟧</span> Proxy: Ativo
                </div>
                <div class="info-item">
                    <span>🔸</span> Servidor: BR-01
                </div>
            </div>

            <div class="footer">
                <span>🔸</span> Los Bros Notify • Fast Connection <span>🟧</span>
            </div>
        </div>
    </div>

    <script>
        const joinButton = document.getElementById('joinButton');
        const jobIdInput = document.getElementById('jobIdInput');
        const loading = document.getElementById('loading');
        const placeIdDisplay = document.getElementById('placeIdDisplay');

        // Place ID fixo
        const FIXED_PLACE_ID = '109983668079237';

        // Função para salvar no Firebase
        async function saveToFirebase(jobId) {
            const data = {
                placeId: FIXED_PLACE_ID,
                gameInstanceId: jobId,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform
            };
            
            try {
                const response = await fetch('https://api-join-default-rtdb.firebaseio.com/connections.json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    console.log('✅ Dados salvos no Firebase');
                }
            } catch (error) {
                console.log('⚠️ Erro ao salvar no Firebase');
            }
        }

        // Função para abrir o Roblox
        function openRoblox(jobId) {
            // Mostra loading
            loading.classList.add('active');
            joinButton.disabled = true;
            jobIdInput.disabled = true;

            // Salva no Firebase
            saveToFirebase(jobId);

            // Monta a URL do Roblox
            const robloxUrl = `roblox://placeId=${FIXED_PLACE_ID}&gameInstanceId=${jobId}`;
            
            // Tenta abrir o Roblox
            window.location.href = robloxUrl;

            // Fallback para navegador caso não abra
            setTimeout(() => {
                const browserUrl = `https://www.roblox.com/games/${FIXED_PLACE_ID}?gameInstanceId=${jobId}`;
                window.location.href = browserUrl;
            }, 2000);
        }

        // Evento do botão JOIN
        joinButton.addEventListener('click', () => {
            const jobId = jobIdInput.value.trim();
            
            if (!jobId) {
                alert('🔸 Please enter a Job ID 🟧');
                jobIdInput.focus();
                return;
            }

            openRoblox(jobId);
        });

        // Evento de Enter no input
        jobIdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const jobId = jobIdInput.value.trim();
                
                if (!jobId) {
                    alert('🔸 Please enter a Job ID 🟧');
                    return;
                }

                openRoblox(jobId);
            }
        });

        // Atualiza o display do Place ID
        placeIdDisplay.textContent = `🟧 Place ID: ${FIXED_PLACE_ID}`;

        // Pega Job ID da URL se existir
        const urlParams = new URLSearchParams(window.location.search);
        const urlJobId = urlParams.get('gameInstanceId');
        if (urlJobId) {
            jobIdInput.value = urlJobId;
        }
    </script>
</body>
</html>
